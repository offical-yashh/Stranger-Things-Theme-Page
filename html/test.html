<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stranger Things | The Quest</title>
    <style>
        /* --- GLOBAL & MINIMALIST GEN-Z STYLING --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0b0b;
            color: #eaeaea;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.1s ease;
        }

        /* --- THE UPSIDE DOWN JUMP-SCARE STATE --- */
        body.upside-down-trap {
            background-color: #8B0000; /* Blood red */
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both infinite;
        }

        /* The hidden Demogorgon image that flashes on screen */
        #scare-image {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            opacity: 0.6;
            z-index: 100;
            mix-blend-mode: multiply; /* Blends it with the red background */
            pointer-events: none;
        }

        body.upside-down-trap #scare-image {
            display: block;
        }

        /* Screen shake animation */
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 2px, 0); }
            20%, 80% { transform: translate3d(4px, -2px, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 4px, 0); }
            40%, 60% { transform: translate3d(6px, -4px, 0); }
        }

        /* --- UI CONTAINER --- */
        .quest-wrapper {
            max-width: 600px;
            width: 90%;
            padding: 40px;
            z-index: 10;
            position: relative;
        }

        .level-badge {
            font-family: 'Courier New', Courier, monospace;
            color: #ff3333;
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .scenario-text {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
            font-style: italic;
        }

        .question-text {
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }

        /* --- BUTTONS --- */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: transparent;
            border: 1px solid #333;
            color: #eaeaea;
            padding: 18px 20px;
            font-size: 1rem;
            text-align: left;
            border-radius: 4px; /* Slight rounding for a modern feel */
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .option-btn:hover {
            border-color: #ff3333;
            background: rgba(255, 51, 51, 0.05);
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.2);
            transform: translateX(5px); /* Dynamic slide effect */
        }

        .option-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            border-color: #333;
        }

        /* Victory state styling */
        .victory-text {
            color: #00ffcc; /* Sci-fi hacker green/blue */
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body>

    <img src="demogorgon.jpg" id="scare-image" alt="Demogorgon">

    <div class="quest-wrapper" id="ui-container">
        <span class="level-badge" id="level-indicator">Level 01</span>
        <p class="scenario-text" id="scenario-text">Intercepting transmission...</p>
        <h1 class="question-text" id="question-text">Loading file...</h1>
        
        <div class="options-container" id="options-container">
            </div>
    </div>

    <audio id="demogorgon-sound" src="roar.mp3" preload="auto"></audio>

    <script>
        /* --- JAVASCRIPT LOGIC --- */
        
        // The 5 Levels defined
        const quests = [
            { 
                level: "LEVEL 01 // ENTRY", 
                scenario: "You've intercepted a corrupted radio transmission.",
                question: "What is the password to get into Will's wooden fort, Castle Byers?", 
                options: ["Mirkwood", "Radagast", "Eggo"],
                answerIndex: 1 
            },
            { 
                level: "LEVEL 02 // VISUAL RECON", 
                scenario: "You must access an encoded image file from the archives.",
                question: "In Season 1, what specific brand of vintage walkie-talkie do the boys use to communicate?", 
                options: ["Sony Walkman", "Motorola Talkabout", "Realistic TRC-214"],
                answerIndex: 2 
            },
            { 
                level: "LEVEL 03 // FREQUENCY SHIFT", 
                scenario: "A song is playing to keep someone safe from the curse.",
                question: "When Max escapes Vecna, what is the exact title of the song she is listening to?", 
                options: ["Running Up That Hill (A Deal with God)", "Hounds of Love", "Should I Stay or Should I Go"],
                answerIndex: 0 
            },
            { 
                level: "LEVEL 04 // ENCRYPTION", 
                scenario: "You have intercepted a Morse code transmission from a Russian spy.",
                question: "What is the hidden Russian code phrase intercepted by Dustin at Starcourt Mall?", 
                options: ["The cat is silver, the week is long.", "The week is long, the silver cat feeds.", "Feed the silver cat this week."],
                answerIndex: 1 
            },
            { 
                level: "LEVEL 05 // DEEP LORE", 
                scenario: "Accessing the ultimate hidden file...",
                question: "Which major character gives Dustin his iconic ROCKETS shirt in Season 2?", 
                options: ["Mike Wheeler", "Steve Harrington", "Ted Wheeler"],
                answerIndex: 2 
            }
        ];

        let currentLevel = 0;
        let isLocked = false; // Prevents clicking during a scare

        // DOM Elements
        const levelText = document.getElementById('level-indicator');
        const scenarioText = document.getElementById('scenario-text');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const scareSound = document.getElementById('demogorgon-sound');

        // Function to load the current question
        function loadQuest() {
            if (currentLevel < quests.length) {
                const currentData = quests[currentLevel];
                levelText.innerText = currentData.level;
                scenarioText.innerText = currentData.scenario;
                questionText.innerText = currentData.question;
                
                // Clear old buttons
                optionsContainer.innerHTML = '';

                // Create new buttons
                currentData.options.forEach((option, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = option;
                    btn.onclick = () => handleAnswer(index, currentData.answerIndex);
                    optionsContainer.appendChild(btn);
                });
            } else {
                // Victory Screen
                levelText.innerText = "STATUS: SAFE";
                levelText.classList.add('victory-text');
                scenarioText.innerText = "Transmission fully decrypted.";
                questionText.innerText = "You have survived the Upside Down. Welcome to the Hellfire Club.";
                optionsContainer.innerHTML = ''; // Clear buttons
            }
        }

        // Handle the user's click
        function handleAnswer(selectedIndex, correctIndex) {
            if (isLocked) return;

            if (selectedIndex === correctIndex) {
                // Correct answer! Move to next.
                currentLevel++;
                loadQuest();
            } else {
                // Wrong answer! Trigger penalty.
                triggerScare();
            }
        }

        // Function to trigger the Demogorgon jump-scare
        function triggerScare() {
            isLocked = true; // Lock inputs
            
            // Turn screen red and shake, show image
            document.body.classList.add('upside-down-trap');
            
            // Play sound
            scareSound.volume = 1.0; // Max volume for jump scare
            scareSound.currentTime = 0; 
            scareSound.play();

            // Disable all buttons so they can't click during the scare
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);

            // Wait 2.5 seconds, then return to normal
            setTimeout(() => {
                document.body.classList.remove('upside-down-trap');
                
                // Re-enable buttons
                buttons.forEach(btn => btn.disabled = false);
                isLocked = false;
            }, 2500); 
        }

        // Initialize the first level
        window.onload = loadQuest;
    </script>
</body>
</html>
